<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pink Glam Makeup Planner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600;700&display=swap');

    :root {
      --pink-50: #fff0f6;
      --pink-100: #ffd6e7;
      --pink-200: #ffadd2;
      --pink-300: #ff85b5;
      --pink-400: #f759ab;
      --pink-500: #eb2f96;
      --pink-600: #c41d7f;
      --gold: #d4a017;
      --gold-light: #f7d06a;
      --white: #ffffff;
      --gray-100: #f9f0f5;
      --gray-400: #b38fa5;
      --gray-600: #7a4f6b;
      --gray-800: #4a1f3a;
      --shadow: 0 4px 24px rgba(235, 47, 150, 0.12);
      --shadow-hover: 0 8px 32px rgba(235, 47, 150, 0.22);
      --radius: 18px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #fff0f6 0%, #fde8f0 40%, #f5d0e8 100%);
      min-height: 100vh;
      color: var(--gray-800);
    }

    /* ── Header ─────────────────────────────── */
    header {
      background: linear-gradient(135deg, #ff85b5 0%, #eb2f96 60%, #c41d7f 100%);
      color: white;
      padding: 0 2rem;
      box-shadow: 0 4px 20px rgba(235,47,150,0.35);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1100px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
      gap: 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .logo-icon { font-size: 2rem; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2)); }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    #searchInput {
      padding: 0.5rem 1rem;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.2);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      width: 200px;
      outline: none;
      transition: all 0.2s;
    }

    #searchInput::placeholder { color: rgba(255,255,255,0.75); }
    #searchInput:focus { background: rgba(255,255,255,0.3); border-color: white; width: 240px; }

    /* ── Tabs ─────────────────────────────── */
    .tabs {
      display: flex;
      gap: 0.25rem;
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 4px;
    }

    .tab-btn {
      padding: 0.4rem 1.1rem;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.8);
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active, .tab-btn:hover {
      background: white;
      color: var(--pink-500);
    }

    /* ── Main layout ─────────────────────────── */
    main {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1.5rem 4rem;
    }

    /* ── Stats bar ─────────────────────────── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: white;
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 1rem;
      border: 1.5px solid var(--pink-100);
    }

    .stat-icon {
      font-size: 2rem;
      width: 52px;
      height: 52px;
      background: var(--pink-50);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stat-info .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--pink-500);
      line-height: 1;
    }

    .stat-info .stat-label {
      font-size: 0.82rem;
      color: var(--gray-400);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Toolbar ─────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gray-800);
    }

    .section-title span { color: var(--pink-500); }

    .toolbar-right { display: flex; align-items: center; gap: 0.75rem; }

    .filter-select {
      padding: 0.5rem 1rem;
      border-radius: 999px;
      border: 2px solid var(--pink-200);
      background: white;
      color: var(--gray-600);
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      outline: none;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.3rem;
      background: linear-gradient(135deg, #ff85b5, #eb2f96);
      color: white;
      border: none;
      border-radius: 999px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(235,47,150,0.35);
      transition: all 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(235,47,150,0.45);
    }

    /* ── Cards grid ─────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .look-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1.5px solid var(--pink-100);
      transition: all 0.25s;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .look-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--pink-300);
    }

    .card-color-strip {
      height: 8px;
      background: linear-gradient(90deg, #ff85b5, #eb2f96, #c41d7f);
    }

    .card-body { padding: 1.25rem 1.25rem 1rem; flex: 1; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      gap: 0.5rem;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gray-800);
      line-height: 1.3;
      flex: 1;
    }

    .fav-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.35rem;
      line-height: 1;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .fav-btn:hover { transform: scale(1.25); }

    .card-occasion {
      display: inline-block;
      padding: 0.2rem 0.75rem;
      background: var(--pink-50);
      color: var(--pink-500);
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
      border: 1px solid var(--pink-100);
    }

    .card-notes {
      font-size: 0.88rem;
      color: var(--gray-600);
      line-height: 1.55;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .products-section { margin-top: 0.5rem; }

    .products-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--gray-400);
      margin-bottom: 0.5rem;
    }

    .products-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .product-tag {
      padding: 0.25rem 0.7rem;
      background: var(--pink-100);
      color: var(--pink-600);
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      border-top: 1.5px solid var(--pink-50);
      background: var(--gray-100);
    }

    .card-date {
      font-size: 0.78rem;
      color: var(--gray-400);
      font-weight: 600;
    }

    .card-actions { display: flex; gap: 0.5rem; }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--pink-200);
      background: white;
      color: var(--pink-400);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
    }

    .icon-btn:hover {
      background: var(--pink-500);
      color: white;
      border-color: var(--pink-500);
    }

    /* ── Empty state ─────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--gray-400);
    }

    .empty-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }

    .empty-state p {
      font-size: 1rem;
      font-weight: 600;
      color: var(--gray-400);
    }

    /* ── Modal ─────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(74, 31, 58, 0.45);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 24px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(235,47,150,0.25);
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-header {
      background: linear-gradient(135deg, #ff85b5, #eb2f96);
      color: white;
      padding: 1.5rem 1.75rem;
      border-radius: 24px 24px 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
    }

    .modal-close {
      background: rgba(255,255,255,0.25);
      border: none;
      color: white;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .modal-close:hover { background: rgba(255,255,255,0.4); }

    .modal-body { padding: 1.75rem; }

    .form-group { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gray-600);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.45rem;
    }

    input[type="text"], textarea, select.form-select {
      width: 100%;
      padding: 0.7rem 1rem;
      border-radius: var(--radius-sm);
      border: 2px solid var(--pink-100);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      color: var(--gray-800);
      outline: none;
      transition: border-color 0.2s;
      background: white;
    }

    input[type="text"]:focus,
    textarea:focus,
    select.form-select:focus {
      border-color: var(--pink-400);
    }

    textarea { resize: vertical; min-height: 90px; }

    /* color picker row */
    .color-row {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .color-swatch {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .color-swatch.selected { border-color: var(--gray-800); transform: scale(1.15); }
    .color-swatch:hover { transform: scale(1.1); }

    /* tag input */
    .tag-input-wrap { display: flex; gap: 0.5rem; }

    .tag-input-wrap input { flex: 1; }

    .btn-outline {
      padding: 0.6rem 1rem;
      border-radius: var(--radius-sm);
      border: 2px solid var(--pink-300);
      background: white;
      color: var(--pink-500);
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
    }

    .btn-outline:hover { background: var(--pink-50); }

    .tags-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.6rem;
    }

    .tag-pill {
      padding: 0.22rem 0.65rem;
      background: var(--pink-100);
      color: var(--pink-600);
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .tag-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--pink-400);
      font-size: 0.9rem;
      line-height: 1;
      padding: 0;
    }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      padding: 1.25rem 1.75rem;
      border-top: 1.5px solid var(--pink-50);
    }

    .btn-cancel {
      padding: 0.6rem 1.3rem;
      border-radius: 999px;
      border: 2px solid var(--pink-200);
      background: white;
      color: var(--gray-600);
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
    }

    .btn-cancel:hover { background: var(--pink-50); }

    /* ── Products view ─────────────────────────── */
    .products-view { display: none; }
    .products-view.active { display: block; }
    .looks-view { display: block; }
    .looks-view.hidden { display: none; }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .product-card {
      background: white;
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: var(--shadow);
      border: 1.5px solid var(--pink-100);
      transition: all 0.22s;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .product-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .product-card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--gray-800);
    }

    .product-card-category {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--pink-400);
    }

    .product-card-usage {
      font-size: 0.83rem;
      color: var(--gray-400);
      font-weight: 600;
      margin-top: auto;
    }

    .product-card-looks {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.25rem;
    }

    .look-ref {
      font-size: 0.75rem;
      background: var(--pink-50);
      color: var(--pink-500);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-weight: 600;
    }

    /* ── Toasts ─────────────────────────── */
    .toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 999;
    }

    .toast {
      background: white;
      border-left: 4px solid var(--pink-500);
      border-radius: var(--radius-sm);
      padding: 0.8rem 1.2rem;
      box-shadow: 0 6px 24px rgba(235,47,150,0.2);
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--gray-800);
      animation: toastIn 0.25s ease, toastOut 0.3s ease 2.5s forwards;
      max-width: 300px;
    }

    @keyframes toastIn  { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(100%); } }

    /* ── Responsive ─────────────────────────── */
    @media (max-width: 640px) {
      .logo-text { font-size: 1.1rem; }
      #searchInput { width: 130px; }
      .stats-bar { grid-template-columns: 1fr; }
      .tabs { display: none; }
      .header-inner { flex-wrap: wrap; height: auto; padding: 0.75rem 0; }
    }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────── -->
<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">&#128141;</span>
      <span class="logo-text">Pink Glam Planner</span>
    </div>
    <input type="text" id="searchInput" placeholder="&#128269; Search looks..." oninput="renderLooks()" />
    <div class="header-actions">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchView('looks', this)">My Looks</button>
        <button class="tab-btn" onclick="switchView('products', this)">Products</button>
      </div>
    </div>
  </div>
</header>

<!-- ── Main ─────────────────────────────── -->
<main>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-icon">&#128141;</div>
      <div class="stat-info">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">Total Looks</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">&#10084;&#65039;</div>
      <div class="stat-info">
        <div class="stat-num" id="statFavs">0</div>
        <div class="stat-label">Favorites</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">&#128138;</div>
      <div class="stat-info">
        <div class="stat-num" id="statProducts">0</div>
        <div class="stat-label">Products Tracked</div>
      </div>
    </div>
  </div>

  <!-- Looks view -->
  <div class="looks-view" id="looksView">
    <div class="toolbar">
      <h2 class="section-title">My <span>Glam Looks</span></h2>
      <div class="toolbar-right">
        <select class="filter-select" id="filterSelect" onchange="renderLooks()">
          <option value="all">All Looks</option>
          <option value="fav">Favorites Only</option>
          <option value="everyday">Everyday</option>
          <option value="glam">Glam</option>
          <option value="natural">Natural</option>
          <option value="night-out">Night Out</option>
          <option value="wedding">Wedding</option>
          <option value="editorial">Editorial</option>
          <option value="other">Other</option>
        </select>
        <button class="btn-primary" onclick="openModal()">
          &#43; New Look
        </button>
      </div>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

  <!-- Products view -->
  <div class="products-view" id="productsView">
    <div class="toolbar">
      <h2 class="section-title">Tracked <span>Products</span></h2>
    </div>
    <div class="products-grid" id="productsGrid"></div>
  </div>

</main>

<!-- ── Modal ─────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">&#10024; New Glam Look</div>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="inputName">Look Name</label>
        <input type="text" id="inputName" placeholder="e.g. Rosy Date Night" />
      </div>
      <div class="form-group">
        <label for="inputOccasion">Occasion</label>
        <select id="inputOccasion" class="form-select">
          <option value="everyday">Everyday</option>
          <option value="glam">Glam</option>
          <option value="natural">Natural</option>
          <option value="night-out">Night Out</option>
          <option value="wedding">Wedding</option>
          <option value="editorial">Editorial</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Color Vibe</label>
        <div class="color-row" id="colorRow"></div>
      </div>
      <div class="form-group">
        <label for="inputNotes">Notes & Steps</label>
        <textarea id="inputNotes" placeholder="Describe your look, steps, tips..."></textarea>
      </div>
      <div class="form-group">
        <label>Products Used</label>
        <div class="tag-input-wrap">
          <input type="text" id="productInput" placeholder="e.g. Charlotte Tilbury Pillow Talk" onkeydown="handleProductKey(event)" />
          <button class="btn-outline" onclick="addProduct()">Add</button>
        </div>
        <div class="tags-preview" id="tagsPreview"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveLook()">Save Look</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  // ── Data ──────────────────────────────────────────────
  const STORAGE_KEY = 'pgmp_looks';

  const COLORS = [
    '#ffb3c6','#ff85b5','#eb2f96','#c41d7f',
    '#ffd6a5','#f7d06a','#ff6b8a','#c77dff',
    '#b5ead7','#a8dadc','#e9c46a','#f4a261'
  ];

  let looks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let editId = null;
  let tempProducts = [];
  let selectedColor = COLORS[1];

  // ── Init ──────────────────────────────────────────────
  function init() {
    buildColorRow();
    renderLooks();
    updateStats();
  }

  function buildColorRow() {
    const row = document.getElementById('colorRow');
    row.innerHTML = COLORS.map(c => `
      <div class="color-swatch ${c === selectedColor ? 'selected' : ''}"
           style="background:${c}"
           onclick="selectColor('${c}', this)"
           title="${c}"></div>
    `).join('');
  }

  function selectColor(color, el) {
    selectedColor = color;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
  }

  // ── Views ──────────────────────────────────────────────
  function switchView(view, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const looksView = document.getElementById('looksView');
    const productsView = document.getElementById('productsView');
    if (view === 'looks') {
      looksView.classList.remove('hidden');
      productsView.classList.remove('active');
    } else {
      looksView.classList.add('hidden');
      productsView.classList.add('active');
      renderProducts();
    }
  }

  // ── Render Looks ──────────────────────────────────────
  function renderLooks() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const filter = document.getElementById('filterSelect').value;

    let filtered = looks.filter(l => {
      const matchSearch = !query ||
        l.name.toLowerCase().includes(query) ||
        l.notes.toLowerCase().includes(query) ||
        l.products.some(p => p.toLowerCase().includes(query));
      const matchFilter =
        filter === 'all' ? true :
        filter === 'fav' ? l.fav :
        l.occasion === filter;
      return matchSearch && matchFilter;
    });

    const grid = document.getElementById('cardsGrid');
    if (!filtered.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">&#128141;</div>
          <p>No looks found. Create your first glam look!</p>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(l => cardHTML(l)).join('');
    updateStats();
  }

  function cardHTML(l) {
    const strip = l.color || '#eb2f96';
    const products = l.products.slice(0, 5);
    const more = l.products.length - 5;
    return `
      <div class="look-card" id="card-${l.id}">
        <div class="card-color-strip" style="background:linear-gradient(90deg,${strip}99,${strip},${strip}cc)"></div>
        <div class="card-body">
          <div class="card-header">
            <div class="card-title">${escHtml(l.name)}</div>
            <button class="fav-btn" onclick="toggleFav('${l.id}')" title="${l.fav ? 'Unfavorite' : 'Favorite'}">
              ${l.fav ? '&#10084;&#65039;' : '&#129293;'}
            </button>
          </div>
          <div class="card-occasion">${l.occasion}</div>
          ${l.notes ? `<div class="card-notes">${escHtml(l.notes)}</div>` : ''}
          ${l.products.length ? `
            <div class="products-section">
              <div class="products-label">Products</div>
              <div class="products-list">
                ${products.map(p => `<span class="product-tag">${escHtml(p)}</span>`).join('')}
                ${more > 0 ? `<span class="product-tag">+${more} more</span>` : ''}
              </div>
            </div>` : ''}
        </div>
        <div class="card-footer">
          <span class="card-date">${formatDate(l.createdAt)}</span>
          <div class="card-actions">
            <button class="icon-btn" onclick="editLook('${l.id}')" title="Edit">&#9998;</button>
            <button class="icon-btn" onclick="deleteLook('${l.id}')" title="Delete">&#128465;</button>
          </div>
        </div>
      </div>`;
  }

  // ── Render Products ──────────────────────────────────
  function renderProducts() {
    const productMap = {};
    looks.forEach(l => {
      l.products.forEach(p => {
        const key = p.trim().toLowerCase();
        if (!productMap[key]) productMap[key] = { name: p, looks: [] };
        productMap[key].looks.push(l.name);
      });
    });

    const entries = Object.values(productMap);
    const grid = document.getElementById('productsGrid');

    if (!entries.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">&#128138;</div>
          <p>No products tracked yet. Add some to your looks!</p>
        </div>`;
      return;
    }

    grid.innerHTML = entries.sort((a,b) => b.looks.length - a.looks.length).map(e => `
      <div class="product-card">
        <div class="product-card-name">${escHtml(e.name)}</div>
        <div class="product-card-usage">Used in ${e.looks.length} look${e.looks.length !== 1 ? 's' : ''}</div>
        <div class="product-card-looks">
          ${e.looks.slice(0,4).map(n => `<span class="look-ref">${escHtml(n)}</span>`).join('')}
          ${e.looks.length > 4 ? `<span class="look-ref">+${e.looks.length - 4}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  // ── Stats ──────────────────────────────────────────────
  function updateStats() {
    document.getElementById('statTotal').textContent = looks.length;
    document.getElementById('statFavs').textContent = looks.filter(l => l.fav).length;
    const allProducts = new Set(looks.flatMap(l => l.products.map(p => p.trim().toLowerCase())));
    document.getElementById('statProducts').textContent = allProducts.size;
  }

  // ── Modal ──────────────────────────────────────────────
  function openModal(id = null) {
    editId = id;
    tempProducts = [];
    selectedColor = COLORS[1];
    buildColorRow();

    const modal = document.getElementById('modalOverlay');
    const title = document.getElementById('modalTitle');

    if (id) {
      const l = looks.find(x => x.id === id);
      document.getElementById('inputName').value = l.name;
      document.getElementById('inputOccasion').value = l.occasion;
      document.getElementById('inputNotes').value = l.notes;
      tempProducts = [...l.products];
      selectedColor = l.color || COLORS[1];
      buildColorRow();
      title.textContent = '&#9998; Edit Look';
    } else {
      document.getElementById('inputName').value = '';
      document.getElementById('inputOccasion').value = 'everyday';
      document.getElementById('inputNotes').value = '';
      title.innerHTML = '&#10024; New Glam Look';
    }

    renderTagsPreview();
    modal.classList.add('open');
    document.getElementById('inputName').focus();
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editId = null;
    tempProducts = [];
  }

  // Close on overlay click
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // ── Products in modal ──────────────────────────────────
  function handleProductKey(e) {
    if (e.key === 'Enter') { e.preventDefault(); addProduct(); }
  }

  function addProduct() {
    const inp = document.getElementById('productInput');
    const val = inp.value.trim();
    if (!val) return;
    if (!tempProducts.includes(val)) {
      tempProducts.push(val);
      renderTagsPreview();
    }
    inp.value = '';
    inp.focus();
  }

  function removeProduct(idx) {
    tempProducts.splice(idx, 1);
    renderTagsPreview();
  }

  function renderTagsPreview() {
    document.getElementById('tagsPreview').innerHTML = tempProducts.map((p, i) => `
      <span class="tag-pill">
        ${escHtml(p)}
        <button class="tag-remove" onclick="removeProduct(${i})" title="Remove">&times;</button>
      </span>`).join('');
  }

  // ── Save / Edit / Delete ──────────────────────────────
  function saveLook() {
    const name = document.getElementById('inputName').value.trim();
    if (!name) { toast('Please enter a look name!'); return; }

    if (editId) {
      const idx = looks.findIndex(l => l.id === editId);
      looks[idx] = {
        ...looks[idx],
        name,
        occasion: document.getElementById('inputOccasion').value,
        notes: document.getElementById('inputNotes').value.trim(),
        products: [...tempProducts],
        color: selectedColor,
        updatedAt: Date.now()
      };
      toast('Look updated!');
    } else {
      looks.unshift({
        id: Date.now().toString(),
        name,
        occasion: document.getElementById('inputOccasion').value,
        notes: document.getElementById('inputNotes').value.trim(),
        products: [...tempProducts],
        color: selectedColor,
        fav: false,
        createdAt: Date.now()
      });
      toast('Look saved!');
    }

    persist();
    closeModal();
    renderLooks();
  }

  function editLook(id) { openModal(id); }

  function deleteLook(id) {
    if (!confirm('Delete this look?')) return;
    looks = looks.filter(l => l.id !== id);
    persist();
    renderLooks();
    toast('Look deleted.');
  }

  function toggleFav(id) {
    const l = looks.find(x => x.id === id);
    l.fav = !l.fav;
    persist();
    renderLooks();
    toast(l.fav ? 'Added to favorites!' : 'Removed from favorites.');
  }

  // ── Persistence ──────────────────────────────────────
  function persist() { localStorage.setItem(STORAGE_KEY, JSON.stringify(looks)); updateStats(); }

  // ── Helpers ──────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(ts) {
    return new Date(ts).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }

  function toast(msg) {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // ── Seed data (first visit) ──────────────────────────
  function seedIfEmpty() {
    if (looks.length) return;
    looks = [
      {
        id: '1',
        name: 'Soft Pink Everyday',
        occasion: 'everyday',
        notes: 'Light foundation, rosy blush, mascara & tinted lip balm. Fresh and effortless.',
        products: ['Fenty Pro Filt\'r Foundation', 'NARS Blush in Orgasm', 'Rare Beauty Mascara', 'Summer Fridays Lip Butter'],
        color: '#ff85b5',
        fav: true,
        createdAt: Date.now() - 5*86400000
      },
      {
        id: '2',
        name: 'Golden Glam Night',
        occasion: 'glam',
        notes: 'Cut crease with gold shimmer, bold lash, contoured cheeks, glossy nude lip.',
        products: ['Charlotte Tilbury Pillow Talk', 'Pat McGrath Gold Eye Shadow', 'Anastasia Beverly Hills Contour Kit'],
        color: '#f7d06a',
        fav: true,
        createdAt: Date.now() - 10*86400000
      },
      {
        id: '3',
        name: 'Romantic Wedding',
        occasion: 'wedding',
        notes: 'Dewy skin, halo eye in rose gold, blush drape, long-wear nude lip.',
        products: ['Giorgio Armani Luminous Silk', 'Charlotte Tilbury Filmstar Bronze & Glow'],
        color: '#c77dff',
        fav: false,
        createdAt: Date.now() - 20*86400000
      }
    ];
    persist();
  }

  seedIfEmpty();
  init();
</script>
</body>
</html>
